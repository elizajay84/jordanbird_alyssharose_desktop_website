<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="form-page">

<header class="site-header">
  <nav class="site-nav container">
    <div class="nav-left">
      <a href="index.html">
        <img src=shortl-list-logo.svg alt="Short List">
      </a>
    </div>

    <div class="nav-center">
      <a href="index.html">Home</a>
      <a href="watch.html">Watch</a>
      <a href="#" class=" submit">Submit</a>
    </div>

    <div class="nav-right">
     <img src="user_avatar.svg" alt="User">
      <img src="hamburger_menue.svg" alt="hamburger menu">

    </div>
  </nav>
</header>

  <section class="form-container">
    <h1>Get Short Listed</h1>
    <div class="form-subtitle">Submit your film to be featured on Short List!</div>

    <form>
      <div class="form-group">
        <label for="firstname">Your First Name <span class="required">*</span></label>
        <input type="text" id="firstname" name="firstname">
      </div>
      <div class="form-group">
        <label for="lastname">Your Last Name <span class="required">*</span></label>
        <input type="text" id="lastname" name="lastname">
      </div>
      <div class="form-group">
        <label for="email">Your Email <span class="required">*</span></label>
        <input type="email" id="email" name="email">
      </div>
      <div class="form-group">
        <label for="film">Film <span class="required">*</span></label>
        <input type="text" id="film" name="film">
      </div>
      <div class="form-group">
        <label for="link">Link to Film <span class="required">*</span></label>
        <input type="url" id="link" name="link">
      </div>
      <button type="submit">Submit</button>
    </form>
  </section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">
        <img src="shortl-list-logo.svg" alt="Short List">
      </div>

      <div class="footer-links">
        <a href="#">About Us</a>
        <a href="#">Contact</a>
        <a href="#">Sign Up</a>
      </div>

      <p>&copy; 2026 Short List. All rights reserved.</p>
    </div>
  </div>
</footer>
</body>
</html>
