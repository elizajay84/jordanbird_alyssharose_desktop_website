<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="form-page">

<header class="site-header">
  <nav class="site-nav container">
    <div class="nav-left">
      <a href="index.html">
        <img src="short-list-logo.svg" alt="Short List Logo">
      </a>
    </div>

    <div class="nav-links">
      <a href="index.html" class="current-page">Home</a>
      <a href="watch.html">Watch</a>
      <a href="form.html">Submit</a>
    </div>
  </nav>
</header>




  <section class="form-container">
    <h1>Get Short Listed</h1>
    <div class="form-subtitle">Submit your film to be featured on Short List!</div>

    <form>
      <div class="form-group">
        <label for="firstname">Your First Name <span class="required">*</span></label>
        <input type="text" id="firstname" name="firstname">
      </div>
      <div class="form-group">
        <label for="lastname">Your Last Name <span class="required">*</span></label>
        <input type="text" id="lastname" name="lastname">
      </div>
      <div class="form-group">
        <label for="email">Your Email <span class="required">*</span></label>
        <input type="email" id="email" name="email">
      </div>
      <div class="form-group">
        <label for="film">Film <span class="required">*</span></label>
        <input type="text" id="film" name="film">
      </div>
      <div class="form-group">
        <label for="link">Link to Film <span class="required">*</span></label>
        <input type="url" id="link" name="link">
      </div>
      <button type="submit">Submit</button>
    </form>
  </section>
<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">
        <img src="short-list-logo.svg" alt="Short List">
      </div>

      <div class="footer-trademark">
        <p>&copy; 2026 Short List. All rights reserved.</p>
      </div>

      <div class="footer-spacer"></div>
    </div>
  </div>
</footer>
</body>
</html>
